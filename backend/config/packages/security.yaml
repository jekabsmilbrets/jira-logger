security:
    role_hierarchy:
        ROLE_API_ADMIN: [ROLE_API_APP, ROLE_API_SETTINGS, ROLE_API_JIRA_SYNC]

    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
        Symfony\Component\Security\Core\User\InMemoryUser: plaintext

    providers:
        api_users:
            memory:
                users:
                    '%env(API_AUTH_USERNAME)%':
                        password: '%env(API_AUTH_PASSWORD)%'
                        roles: ['ROLE_API_ADMIN']
                    'app-api-user':
                        password: '%env(API_AUTH_PASSWORD)%'
                        roles: ['ROLE_API_APP']
                    'settings-api-user':
                        password: '%env(API_AUTH_PASSWORD)%'
                        roles: ['ROLE_API_SETTINGS']
                    'jira-sync-api-user':
                        password: '%env(API_AUTH_PASSWORD)%'
                        roles: ['ROLE_API_JIRA_SYNC']

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            stateless: true
            provider: api_users
            http_basic: ~

    access_control:
        - { path: ^/api/monitor, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
