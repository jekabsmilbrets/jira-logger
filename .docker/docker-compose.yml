services:
  assets-init:
    container_name: "jira-logger-assets-init"
    build:
      context: ./../
      dockerfile: ./.docker/assets-init/Dockerfile
    environment:
      - ASSETS_VERSION=${ASSETS_VERSION:-unknown}
      - API_HOST=${API_HOST:-https://jira-logger.io}
      - API_BASE=${API_BASE:-/api}
    volumes:
      - assetsData:/assets:rw
    command: ["/usr/local/bin/assets-init.sh"]
    restart: "no"
    labels:
      - "traefik.enable=false"

  db:
    container_name: "jira-logger-db"
    image: postgres:${POSTGRES_VERSION}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      TZ: 'UTC'
      PGTZ: 'UTC'
    volumes:
      - dbData:/var/lib/postgresql/data:rw
      - ./postgresql/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_destination=stderr
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 10s
    labels:
      - "traefik.enable=false"

  php-fpm:
    container_name: "jira-logger-php-fpm"
    build:
      context: ./../
      dockerfile: ./.docker/php-fpm/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-prod}
      - APP_SECRET=${APP_SECRET:?APP_SECRET is required}
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - APP_INTERNAL_TIMEZONE=${APP_INTERNAL_TIMEZONE:?APP_INTERNAL_TIMEZONE is required}
      - APP_DEFAULT_USER_TIMEZONE=${APP_DEFAULT_USER_TIMEZONE:?APP_DEFAULT_USER_TIMEZONE is required}
      - CORS_ALLOW_ORIGIN=${CORS_ALLOW_ORIGIN:?CORS_ALLOW_ORIGIN is required}
      - API_AUTH_USERNAME=${API_AUTH_USERNAME:?API_AUTH_USERNAME is required}
      - API_AUTH_PASSWORD=${API_AUTH_PASSWORD:?API_AUTH_PASSWORD is required}
      - JIRA_PERSONAL_ACCESS_TOKEN=${JIRA_PERSONAL_ACCESS_TOKEN-}
    volumes:
      - assetsData:/var/www/public/ng:ro
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=false"

  nginx:
    container_name: "jira-logger-nginx"
    build:
      context: ./../
      dockerfile: ./.docker/nginx/Dockerfile
    depends_on:
      assets-init:
        condition: service_completed_successfully
      php-fpm:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      - API_HOST=${API_HOST:-https://jira-logger.io}
      - API_BASE=${API_BASE:-/api}
    volumes:
      - assetsData:/var/www/public/ng:ro
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 60s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    container_name: "jira-logger-migrate"
    build:
      context: ./../
      dockerfile: ./.docker/php-fpm/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-prod}
      - APP_SECRET=${APP_SECRET:?APP_SECRET is required}
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - APP_INTERNAL_TIMEZONE=${APP_INTERNAL_TIMEZONE:?APP_INTERNAL_TIMEZONE is required}
      - APP_DEFAULT_USER_TIMEZONE=${APP_DEFAULT_USER_TIMEZONE:?APP_DEFAULT_USER_TIMEZONE is required}
      - CORS_ALLOW_ORIGIN=${CORS_ALLOW_ORIGIN:?CORS_ALLOW_ORIGIN is required}
      - API_AUTH_USERNAME=${API_AUTH_USERNAME:?API_AUTH_USERNAME is required}
      - API_AUTH_PASSWORD=${API_AUTH_PASSWORD:?API_AUTH_PASSWORD is required}
      - JIRA_PERSONAL_ACCESS_TOKEN=${JIRA_PERSONAL_ACCESS_TOKEN-}
    command:
      - sh
      - -c
      - php bin/console doctrine:database:create --if-not-exists --no-interaction; php bin/console doctrine:migrations:migrate --no-interaction
    restart: "no"
    profiles:
      - release

volumes:
  dbData:
  assetsData:
