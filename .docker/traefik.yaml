## STATIC CONFIG (restart traefik to update)

# shows you a log msg if a newer image tag can be used
global:
  checkNewVersion: true

# log default is ERROR, but WARN is more helpful
log:
  level: WARN
  filePath: /var/log/traefik/log-traefik.log
  # level: INFO

accessLog:
  filePath: /var/log/traefik/log-traefik-access.log

# enable dashboard on 8080 with auth
api:
  insecure: false
  dashboard: true

# enable ping so the `traefik healthcheck` works
ping: { }

# use this file for dynamic config (tls + project routing)
providers:
  file:
    fileName: /etc/traefik/traefik.yaml
    watch: true

# listen on 80/443, and redirect all 80 to 443 via 301
entryPoints:
  web:
    address: :80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: :443


## DYNAMIC CONFIG

tls:
  certificates:
    - certFile: /certs/jira-logger.io.crt
      keyFile: /certs/jira-logger.io.key
      # when testing certs, enable this so traefik doesn't use
      # it's own self signed. By default if it can't find a matching
      # cert, it'll just create it's own which will cause cert warnings
      # in browser
  options:
    default:
      sniStrict: true
      minVersion: VersionTLS12

http:
  routers:
    jira-logger-nginx:
      rule: Host(`jira-logger.io`)
      entryPoints:
        - websecure
      tls: true
      service: jira-logger-nginx

    jira-logger-traefik-dashboard:
      rule: Host(`traefik.jira-logger.io`)
      entryPoints:
        - websecure
      tls: true
      service: api@internal
      middlewares:
        - jira-logger-traefik-dashboard-auth

  services:
    jira-logger-nginx:
      loadBalancer:
        servers:
          - url: http://nginx:80

  middlewares:
    jira-logger-traefik-dashboard-auth:
      basicAuth:
        users:
          - "admin:$$2y$$05$$OEJ1rq.qLRZo5tl/zQQ4/.x0NPgosA2ZDGklnroI4H3xInIGt9RTO"
