<div class="base-container mat-typography">
    <layout-header [activeMenu]="activeMenu()"
                   [activeTask]="activeTask()"
                   [isLoading]="isLoading()"
                   [sidenav]="sidenav"
                   [timeLoggedToday]="timeLoggedToday()"/>

    <mat-sidenav-container [style.marginTop.px]="0"
                           class="app-sidenav-container">
        <mat-sidenav #sidenav
                     fixedTopGap="56"
                     mode="over">
            <layout-sidenav (sidenavClose)="sidenav.close()"/>
        </mat-sidenav>

        <mat-sidenav-content>
            <router-outlet/>
        </mat-sidenav-content>
    </mat-sidenav-container>
</div>
