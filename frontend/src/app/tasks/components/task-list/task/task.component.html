<form (submit)="onUpdate($event)">
    <mat-card [ngClass]="getCardClassMap()"
              class="task-card">
        <mat-card-header [style.display]="getViewModeDisplay()">
            <mat-card-title>
                <span class="card-title"
                      [matTooltipDisabled]="task().name.length < 20"
                      [matTooltip]="task().name">
                    {{ task().name }}
                </span>

                <mat-chip-listbox aria-label="Task tags"
                                  disabled>
                    @for (tag of task().tags; track tag.id) {
                        <mat-chip-option>{{ tag.name }}</mat-chip-option>
                    }
                </mat-chip-listbox>
            </mat-card-title>
        </mat-card-header>

        <mat-card-content [style.display]="getEditModeDisplay()">
            <mat-form-field class="input-form-field">
                <mat-label>Task</mat-label>

                <input [formField]="taskForm.name"
                       matInput/>

                <mat-error [style.display]="hasNameError() ? '' : 'none'">Task name is required.</mat-error>
            </mat-form-field>

            <mat-form-field class="input-form-field">
                <mat-label>Tags</mat-label>

                <mat-select (valueChange)="onTagsChange($event)"
                            [compareWith]="isSameTag"
                            [value]="taskFormModel().tags"
                            multiple>
                    @for (tag of tags(); track tag.id) {
                        <mat-option [value]="tag">
                            {{ tag.name }}
                        </mat-option>
                    }
                </mat-select>
            </mat-form-field>

            <mat-form-field class="input-form-field">
                <mat-label>Description</mat-label>

                <textarea [formField]="taskForm.description"
                          matInput></textarea>
            </mat-form-field>
        </mat-card-content>

        <mat-card-actions class="task-card-actions">
            <div class="card-task-info">
                <span>{{ getTaskDescription() }}</span>

                <span>Total Time Worked: {{ task().timeLogged | readableTime }}</span>
            </div>

            <button (click)="onToggleTimeLogging()"
                    [disabled]="isViewActionDisabled()"
                    aria-label="Start Timer"
                    class="play-pause-button"
                    color="primary"
                    mat-icon-button
                    type="button">
                <mat-icon>timer</mat-icon>
                <mat-icon>{{ getTimerActionIcon() }}</mat-icon>
            </button>

            <button (click)="onOpenTimeLogsModal()"
                    [disabled]="isViewActionDisabled()"
                    aria-label="View Time Log History"
                    color="warn"
                    mat-icon-button
                    type="button">
                <mat-icon>history</mat-icon>
            </button>

            <button (click)="onToggleEditMode()"
                    [disabled]="!editMode() && isLoading()"
                    aria-label="Edit"
                    mat-icon-button
                    type="button">
                <mat-icon>{{ getEditButtonIcon() }}</mat-icon>
            </button>

            <button [disabled]="isSaveDisabled()"
                    [style.display]="getEditModeDisplay()"
                    aria-label="Update"
                    mat-icon-button
                    color="primary"
                    type="submit">
                <mat-icon>save</mat-icon>
            </button>

            <button (click)="onRemove()"
                    [disabled]="isRemoveDisabled()"
                    aria-label="Remove"
                    color="warn"
                    mat-icon-button
                    type="button">
                <mat-icon>delete</mat-icon>
            </button>
        </mat-card-actions>
    </mat-card>
</form>
