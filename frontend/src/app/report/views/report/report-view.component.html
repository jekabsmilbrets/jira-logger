<shared-shared-table (cellClicked)="onCellClick($event)"
                     (footerCellClicked)="onFooterCellClicked($event)"
                     (syncAction)="onSyncClick($event)"
                     [columns]="columns()"
                     [data]="tasks()"
                     [enableFooter]="true"
                     [enableSyncAction]="reportMode() === ReportMode.date"
                     [isSelectable]="false"
                     [stickyFooter]="true"
                     [stickyHeader]="true"
                     sortDirection="desc"
                     sortField="lastTimeLogStartTime"/>
