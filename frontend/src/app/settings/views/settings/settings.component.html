<div class="settings-container">
    <!--    <app-task-list-configurator [disabled]="isLoading()"></app-task-list-configurator>-->

    <settings-report-configurator (dateChange)="onDateChange($event)"
                                  (endDateChange)="onEndDateChange($event)"
                                  (hideUnreportedTasksChange)="onHideUnreportedTasksChange($event)"
                                  (reportModeChange)="onReportModeChange($event)"
                                  (showWeekendsChange)="onShowWeekendsChange($event)"
                                  (startDateChange)="onStartDateChange($event)"
                                  (tagChange)="onTagChange($event)"
                                  [disabled]="isLoading()"
                                  [reportSettings]="reportSettings()"/>

    <settings-jira-api-configurator (settingsChange)="onSettingsChange($event)"
                                    [disabled]="isLoading()"
                                    [settings]="jiraApiSettings()"/>

    <settings-timezone-configurator (settingsChange)="onSettingsChange($event)"
                                    [disabled]="isLoading()"
                                    [settings]="jiraUserSettings()"/>
</div>
