<form (submit)="onSaveFormData($event)">
    <mat-card>
        <mat-card-header>
            <mat-card-title>JIRA API</mat-card-title>
        </mat-card-header>

        <mat-card-content>
            <mat-slide-toggle (change)="onEnabledChange($event.checked)"
                              [checked]="jiraApiFormModel().enabled"
                              [disabled]="jiraApiForm().disabled()">
                Enabled
            </mat-slide-toggle>

            <mat-form-field>
                <mat-label>Jira Host</mat-label>

                <input [formField]="jiraApiForm.host"
                       matInput/>

                @if (hasHostError()) {
                    <mat-error>Host is required.</mat-error>
                }
            </mat-form-field>

            <mat-form-field>
                <mat-label>Personal Access Token</mat-label>

                <input [formField]="jiraApiForm.personalAccessToken"
                       [type]="getPersonalAccessTokenInputType()"
                       autoComplete="off"
                       matInput/>

                @if (showTokenRequiredError()) {
                    <mat-error>Token is required.</mat-error>
                }

                @if (showStoredTokenHint()) {
                    <mat-hint>Token already configured. Leave blank to keep it, or enter a new token.</mat-hint>
                }

                <button (click)="togglePersonalAccessTokenVisibility()"
                        [attr.aria-label]="getPersonalAccessTokenVisibilityLabel()"
                        [attr.aria-pressed]="hidePersonalAccessToken()"
                        mat-icon-button
                        matSuffix
                        type="button">
                    <mat-icon>{{ getPersonalAccessTokenVisibilityIcon() }}</mat-icon>
                </button>
            </mat-form-field>
        </mat-card-content>

        <mat-card-actions>
            <button (click)="onCancel()"
                    [disabled]="jiraApiForm().disabled()"
                    aria-label="Cancel"
                    color="danger"
                    mat-raised-button
                    type="button">
                Cancel
            </button>

            <button [disabled]="isSaveDisabled()"
                    aria-label="Save"
                    color="primary"
                    mat-raised-button
                    type="submit">
                Save
            </button>
        </mat-card-actions>
    </mat-card>
</form>
