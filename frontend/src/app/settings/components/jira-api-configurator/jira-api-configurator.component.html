<form (ngSubmit)="onSaveFormData()"
      [formGroup]="formGroup">
    <mat-card>
        <mat-card-header>
            <mat-card-title>JIRA API</mat-card-title>
        </mat-card-header>

        @if (settings()) {
            <mat-card-content>
                <mat-slide-toggle formControlName="jira.enabled">Enabled</mat-slide-toggle>

                <mat-form-field>
                    <mat-label>Jira Host</mat-label>

                    <input formControlName="jira.host"
                           matInput/>

                    <mat-error>Host is required.</mat-error>
                </mat-form-field>

                <mat-form-field>
                    <mat-label>Personal Access Token</mat-label>

                    <input [type]="hidePersonalAccessToken ? 'password' : 'text'"
                           autoComplete="off"
                           formControlName="jira.personal-access-token"
                           matInput/>

                    <mat-error>Token is required.</mat-error>

                    @if (hasStoredPersonalAccessToken) {
                        <mat-hint>Token already configured. Leave blank to keep it, or enter a new token.</mat-hint>
                    }

                    <button (click)="hidePersonalAccessToken = !hidePersonalAccessToken"
                            [attr.aria-label]="hidePersonalAccessToken ? 'Show token' : 'Hide token'"
                            [attr.aria-pressed]="hidePersonalAccessToken"
                            mat-icon-button
                            matSuffix
                            type="button">
                        <mat-icon>{{ hidePersonalAccessToken ? 'visibility_off' : 'visibility' }}</mat-icon>
                    </button>
                </mat-form-field>
            </mat-card-content>
        }

        <mat-card-actions>
            <button (click)="onCancel()"
                    [disabled]="formGroup.disabled"
                    aria-label="Cancel"
                    color="danger"
                    mat-raised-button
                    type="button">
                Cancel
            </button>

            <button [disabled]="formGroup.disabled || !formGroup.dirty || formGroup.invalid"
                    aria-label="Save"
                    color="primary"
                    mat-raised-button
                    type="submit">
                Save
            </button>
        </mat-card-actions>
    </mat-card>
</form>
