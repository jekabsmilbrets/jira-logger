<form (submit)="onSaveFormData($event)">
    <mat-card>
        <mat-card-header>
            <mat-card-title>JIRA API</mat-card-title>
        </mat-card-header>

        <mat-card-content>
            <mat-slide-toggle (change)="onEnabledChange($event.checked)"
                              [checked]="jiraApiFormModel().enabled"
                              [disabled]="jiraApiForm().disabled()">
                Enabled
            </mat-slide-toggle>

            <mat-form-field>
                <mat-label>Jira Host</mat-label>

                <input [formField]="jiraApiForm.host"
                       matInput/>

                <mat-error [style.display]="hasHostError() ? '' : 'none'">Host is required.</mat-error>
            </mat-form-field>

            <mat-form-field>
                <mat-label>Personal Access Token</mat-label>

                <input [formField]="jiraApiForm.personalAccessToken"
                       [type]="hidePersonalAccessToken() ? 'password' : 'text'"
                       autoComplete="off"
                       matInput/>

                <mat-error [style.display]="showTokenRequiredError() ? '' : 'none'">Token is required.</mat-error>

                <mat-hint [style.display]="showStoredTokenHint() ? '' : 'none'">Token already configured. Leave blank to keep it, or enter a new token.</mat-hint>

                <button (click)="hidePersonalAccessToken.set(!hidePersonalAccessToken())"
                        [attr.aria-label]="hidePersonalAccessToken() ? 'Show token' : 'Hide token'"
                        [attr.aria-pressed]="hidePersonalAccessToken()"
                        mat-icon-button
                        matSuffix
                        type="button">
                    <mat-icon>{{ hidePersonalAccessToken() ? 'visibility_off' : 'visibility' }}</mat-icon>
                </button>
            </mat-form-field>
        </mat-card-content>

        <mat-card-actions>
            <button (click)="onCancel()"
                    [disabled]="jiraApiForm().disabled()"
                    aria-label="Cancel"
                    color="danger"
                    mat-raised-button
                    type="button">
                Cancel
            </button>

            <button [disabled]="jiraApiForm().disabled() || !jiraApiForm().dirty() || jiraApiForm().invalid()"
                    aria-label="Save"
                    color="primary"
                    mat-raised-button
                    type="submit">
                Save
            </button>
        </mat-card-actions>
    </mat-card>
</form>
