<mat-card>
    <mat-card-header>
        <mat-card-title>Task List</mat-card-title>
    </mat-card-header>

    <mat-card-content class="task-list-configurator">
        <div class="task-list-configurator__row task-list-configurator__row--new">
            <mat-form-field class="task-list-configurator__field">
                <mat-label>New Tag</mat-label>
                <input (input)="onNewTagNameInput(newTagInput.value)"
                       [disabled]="disabled()"
                       [value]="newTagName()"
                       #newTagInput
                       matInput>
            </mat-form-field>

            <button (click)="onCreateTag()"
                    [disabled]="isCreateDisabled()"
                    color="primary"
                    mat-raised-button
                    type="button">
                Add
            </button>
        </div>

        @for (tag of tags(); track tag.id) {
            <div class="task-list-configurator__row">
                <mat-form-field class="task-list-configurator__field">
                    <mat-label>Tag Name</mat-label>
                    <input (input)="onTagNameInput(tag.id, tagNameInput.value)"
                           [disabled]="disabled()"
                           [value]="getTagNameValue(tag)"
                           #tagNameInput
                           matInput>
                </mat-form-field>

                <div class="task-list-configurator__actions">
                    <button (click)="onSaveTag(tag)"
                            [disabled]="isSaveDisabled(tag)"
                            color="primary"
                            mat-raised-button
                            type="button">
                        Save
                    </button>

                    <button (click)="onDeleteTag(tag)"
                            [disabled]="isDeleteDisabled(tag)"
                            color="warn"
                            mat-raised-button
                            type="button">
                        Delete
                    </button>
                </div>

                @if (tag.isUsed) {
                    <p class="task-list-configurator__usage-hint">Used by existing tasks</p>
                }
            </div>
        }
    </mat-card-content>
</mat-card>
